<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC Scheduler</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0f0; height: 100vh; display: flex; overflow: hidden; }

    /* Sidebar */
    #sidebar { width: 220px; min-width: 220px; background: #13132a; border-right: 1px solid #1e1e3a; display: flex; flex-direction: column; }
    #sidebar-header { padding: 18px 16px 12px; border-bottom: 1px solid #1e1e3a; }
    #sidebar-header h1 { font-size: 15px; font-weight: 700; color: #a78bfa; letter-spacing: 0.3px; }
    #sidebar-header p { font-size: 11px; color: #5050809; margin-top: 2px; color: #60609a; }
    #org-section-title { padding: 14px 16px 6px; font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: #50508a; }
    #org-list { flex: 1; overflow-y: auto; }
    .org-item { padding: 9px 16px; cursor: pointer; font-size: 13px; color: #a0a0c0; border-left: 2px solid transparent; transition: all 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .org-item:hover { background: #1a1a35; color: #c0c0e0; }
    .org-item.active { background: #1e1a3a; border-left-color: #7c3aed; color: #c4b5fd; }

    /* Main */
    #main { flex: 1; overflow-y: auto; padding: 28px 32px; }
    #main-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    #main-header h2 { font-size: 18px; font-weight: 600; color: #e0e0f8; }

    /* App grid */
    #apps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 14px; }

    /* App card */
    .app-card { background: #13132a; border: 1px solid #1e1e3a; border-radius: 10px; padding: 18px; }
    .app-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .app-card-title { flex: 1; min-width: 0; }
    .app-card-title h3 { font-size: 13px; font-weight: 600; color: #d0d0f0; display: flex; align-items: center; gap: 7px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .app-card-title .app-id { font-size: 10px; color: #404070; font-family: monospace; margin-top: 3px; }

    /* Status dot */
    .dot { width: 7px; height: 7px; min-width: 7px; border-radius: 50%; }
    .dot-on { background: #4ade80; box-shadow: 0 0 6px #4ade8088; }
    .dot-off { background: #303060; }

    /* Schedule block */
    .sched-block { background: #0d0d22; border: 1px solid #1a1a38; border-radius: 7px; padding: 11px 13px; margin-bottom: 10px; }
    .sched-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; margin-bottom: 7px; }
    .sched-row:last-child { margin-bottom: 0; }
    .sched-label { color: #50508a; font-size: 11px; min-width: 50px; }
    .cron-tag { background: #1e1040; color: #a78bfa; padding: 2px 8px; border-radius: 4px; font-family: monospace; font-size: 11px; }
    .tz-tag { color: #6060a0; font-size: 11px; }

    /* Toggle */
    .sw { position: relative; display: inline-flex; align-items: center; cursor: pointer; gap: 7px; }
    .sw input { opacity: 0; width: 0; height: 0; position: absolute; }
    .sw-track { width: 30px; height: 17px; background: #252545; border-radius: 9px; transition: background .2s; position: relative; }
    .sw input:checked ~ .sw-track { background: #7c3aed; }
    .sw-thumb { position: absolute; top: 2px; left: 2px; width: 13px; height: 13px; background: white; border-radius: 50%; transition: left .2s; }
    .sw input:checked ~ .sw-track .sw-thumb { left: 15px; }
    .sw-label { font-size: 11px; color: #7070a0; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 11px; border-radius: 5px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; transition: all .15s; white-space: nowrap; }
    .btn-purple { background: #4c1d95; color: #c4b5fd; }
    .btn-purple:hover { background: #5b21b6; }
    .btn-green { background: #052e16; color: #4ade80; border: 1px solid #14532d; }
    .btn-green:hover { background: #14532d; }
    .btn-red { background: #1c0a0a; color: #f87171; border: 1px solid #3b1010; }
    .btn-red:hover { background: #3b1010; }
    .btn-ghost { background: transparent; color: #7070a0; border: 1px solid #252548; }
    .btn-ghost:hover { background: #1a1a38; color: #a0a0c0; }
    .btn-icon { padding: 5px 8px; }
    .btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .btn-add { background: #1a1040; color: #7c5dfa; border: 1px dashed #3a2070; width: 100%; justify-content: center; padding: 8px; margin-top: 4px; }
    .btn-add:hover { background: #251a50; border-style: solid; }

    /* Empty/loading states */
    .state-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; height: calc(100vh - 120px); color: #303060; text-align: center; }
    .state-empty svg { margin-bottom: 16px; opacity: 0.3; }
    .state-empty p { font-size: 14px; }
    .loader-inline { display: inline-block; width: 14px; height: 14px; border: 2px solid #252548; border-top-color: #7c3aed; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal */
    #overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,10,.75); z-index: 50; align-items: center; justify-content: center; }
    #overlay.open { display: flex; }
    #modal { background: #13132a; border: 1px solid #252545; border-radius: 14px; padding: 26px; width: 440px; max-width: 96vw; max-height: 92vh; overflow-y: auto; }
    #modal h3 { font-size: 15px; margin-bottom: 20px; color: #d0d0f0; }
    .fg { margin-bottom: 14px; }
    .fg label { display: block; font-size: 11px; color: #6060909; margin-bottom: 5px; color: #7070a8; }
    .fg input, .fg select { width: 100%; background: #0d0d22; border: 1px solid #1e1e3a; color: #d0d0f0; padding: 8px 11px; border-radius: 6px; font-size: 13px; outline: none; transition: border .15s; }
    .fg input:focus, .fg select:focus { border-color: #6d28d9; }
    .fg input:disabled { opacity: .4; cursor: default; }
    .fg-hint { font-size: 10px; color: #404068; margin-top: 4px; }
    .fg-row { display: flex; gap: 10px; }
    .fg-row .fg { flex: 1; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; border-top: 1px solid #1e1e3a; padding-top: 16px; }

    /* Toast */
    #toast { position: fixed; bottom: 20px; right: 20px; padding: 10px 16px; border-radius: 8px; font-size: 13px; transform: translateY(70px); transition: transform .25s; z-index: 100; pointer-events: none; }
    #toast.ok { background: #071a0f; border: 1px solid #14532d; color: #4ade80; transform: translateY(0); }
    #toast.err { background: #1a0707; border: 1px solid #3b1010; color: #f87171; transform: translateY(0); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #252548; border-radius: 3px; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>CC Scheduler</h1>
    <p>Gestion des horaires</p>
  </div>
  <div id="org-section-title">Organisations</div>
  <div id="org-list"><div style="padding:16px;color:#404070;font-size:12px;display:flex;align-items:center;gap:8px"><span class="loader-inline"></span> Chargement…</div></div>
</div>

<div id="main">
  <div id="content">
    <div class="state-empty">
      <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6v6l4 2m6-2a10 10 0 11-20 0 10 10 0 0120 0z"/></svg>
      <p>Sélectionne une organisation</p>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="overlay">
  <div id="modal">
    <h3 id="modal-title">Configurer un schedule</h3>
    <form id="sched-form" autocomplete="off">
      <input type="hidden" id="f-id">
      <input type="hidden" id="f-org">
      <input type="hidden" id="f-app">
      <div class="fg">
        <label>Application</label>
        <input type="text" id="f-appname" disabled>
      </div>
      <div class="fg">
        <label>Nom du schedule <span style="color:#404068">(optionnel)</span></label>
        <input type="text" id="f-name" placeholder="ex: Nuit semaine">
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Extinction (cron stop)</label>
          <input type="text" id="f-stop" placeholder="0 20 * * 1-5">
          <div class="fg-hint">Laisser vide pour désactiver</div>
        </div>
        <div class="fg">
          <label>Démarrage (cron start)</label>
          <input type="text" id="f-start" placeholder="0 8 * * 1-5">
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Fuseau horaire</label>
          <select id="f-tz">
            <option value="Europe/Paris">Europe/Paris</option>
            <option value="UTC">UTC</option>
            <option value="Europe/London">Europe/London</option>
            <option value="Europe/Berlin">Europe/Berlin</option>
            <option value="America/New_York">America/New_York</option>
            <option value="America/Chicago">America/Chicago</option>
            <option value="America/Los_Angeles">America/Los_Angeles</option>
            <option value="Asia/Tokyo">Asia/Tokyo</option>
            <option value="Asia/Shanghai">Asia/Shanghai</option>
          </select>
        </div>
        <div class="fg" style="display:flex;align-items:flex-end;padding-bottom:1px">
          <label class="sw" style="cursor:pointer">
            <input type="checkbox" id="f-enabled" checked>
            <span class="sw-track"><span class="sw-thumb"></span></span>
            <span class="sw-label" style="font-size:13px;color:#a0a0c0">Actif</span>
          </label>
        </div>
      </div>
      <div class="fg-hint" style="margin-top:-6px;margin-bottom:10px">
        Format cron : <code style="color:#7c5dfa">minute heure * * jours</code> — ex: <code style="color:#7c5dfa">0 20 * * 1-5</code> = lun-ven à 20h
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        <button type="submit" class="btn btn-purple">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<div id="toast"></div>

<script>
  let currentOrg = null;
  let schedules = [];

  async function req(method, path, body) {
    const r = await fetch(path, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!r.ok) { const t = await r.text(); throw new Error(t || r.status); }
    if (r.status === 204) return null;
    return r.json();
  }

  // Load orgs on boot
  (async () => {
    try {
      const orgs = await req('GET', '/orgs');
      const list = document.getElementById('org-list');
      if (!Array.isArray(orgs) || orgs.length === 0) {
        list.innerHTML = '<div style="padding:16px;color:#404070;font-size:12px">Aucune organisation trouvée</div>';
        return;
      }
      list.innerHTML = orgs.map(o =>
        `<div class="org-item" onclick="loadOrg('${esc(o.id)}','${esc(o.name)}')" id="org-${esc(o.id)}">${esc(o.name)}</div>`
      ).join('');
    } catch(e) {
      document.getElementById('org-list').innerHTML = `<div style="padding:16px;color:#f87171;font-size:12px">Erreur: ${esc(e.message)}</div>`;
    }
  })();

  async function loadOrg(orgId, orgName) {
    currentOrg = { id: orgId, name: orgName };
    document.querySelectorAll('.org-item').forEach(el => el.classList.remove('active'));
    document.getElementById('org-' + orgId)?.classList.add('active');

    document.getElementById('content').innerHTML =
      `<div id="main-header"><h2>${esc(orgName)}</h2></div>` +
      `<div style="display:flex;align-items:center;gap:10px;color:#50508a"><span class="loader-inline"></span> Chargement des applications…</div>`;

    try {
      const [apps, scheds] = await Promise.all([
        req('GET', '/orgs/' + orgId + '/apps'),
        req('GET', '/schedules')
      ]);
      schedules = scheds || [];
      renderOrg(orgId, orgName, Array.isArray(apps) ? apps : [], schedules);
    } catch(e) {
      document.getElementById('content').innerHTML =
        `<div id="main-header"><h2>${esc(orgName)}</h2></div><div style="color:#f87171">Erreur: ${esc(e.message)}</div>`;
    }
  }

  function renderOrg(orgId, orgName, apps, scheds) {
    if (apps.length === 0) {
      document.getElementById('content').innerHTML =
        `<div id="main-header"><h2>${esc(orgName)}</h2></div><div style="color:#404070;padding:40px 0;text-align:center">Aucune application dans cette organisation</div>`;
      return;
    }
    const cards = apps.map(app => buildCard(orgId, app, scheds.filter(s => s.app_id === app.id))).join('');
    document.getElementById('content').innerHTML =
      `<div id="main-header"><h2>${esc(orgName)}</h2><span style="font-size:12px;color:#50508a">${apps.length} application${apps.length>1?'s':''}</span></div>` +
      `<div id="apps-grid">${cards}</div>`;
  }

  function buildCard(orgId, app, appScheds) {
    const name = app.name || app.id;
    const hasScheds = appScheds.length > 0;

    const schedHtml = appScheds.map(s => `
      <div class="sched-block" id="sb-${s.id}">
        ${s.name ? `<div class="sched-row"><span class="sched-label">Nom</span><span style="font-size:12px">${esc(s.name)}</span></div>` : ''}
        ${s.cron_stop  ? `<div class="sched-row"><span class="sched-label">Stop</span><span class="cron-tag">${esc(s.cron_stop)}</span></div>` : ''}
        ${s.cron_start ? `<div class="sched-row"><span class="sched-label">Start</span><span class="cron-tag">${esc(s.cron_start)}</span></div>` : ''}
        <div class="sched-row">
          <span class="sched-label">TZ</span>
          <span class="tz-tag">${esc(s.timezone)}</span>
        </div>
        <div class="sched-row" style="margin-top:8px">
          <label class="sw" onclick="toggle('${s.id}',this)">
            <input type="checkbox" ${s.enabled?'checked':''} onchange="toggleSched('${s.id}',this.checked)">
            <span class="sw-track"><span class="sw-thumb"></span></span>
            <span class="sw-label">${s.enabled?'Actif':'Inactif'}</span>
          </label>
          <div style="display:flex;gap:5px">
            <button class="btn btn-green btn-icon" title="Démarrer maintenant" onclick="trigger('${s.id}','start')">▶</button>
            <button class="btn btn-red btn-icon" title="Éteindre maintenant" onclick="trigger('${s.id}','stop')">■</button>
            <button class="btn btn-ghost btn-icon" title="Modifier" onclick="openModal('${orgId}','${app.id}','${esc(name)}','${s.id}')">✎</button>
            <button class="btn btn-red btn-icon" title="Supprimer" onclick="delSched('${s.id}')">✕</button>
          </div>
        </div>
      </div>
    `).join('');

    return `
      <div class="app-card" id="card-${app.id}">
        <div class="app-card-header">
          <div class="app-card-title">
            <h3><span class="dot ${hasScheds?'dot-on':'dot-off'}"></span>${esc(name)}</h3>
            <div class="app-id">${app.id}</div>
          </div>
        </div>
        ${schedHtml}
        <button class="btn btn-add" onclick="openModal('${orgId}','${app.id}','${esc(name)}',null)">+ Ajouter un schedule</button>
      </div>
    `;
  }

  function openModal(orgId, appId, appName, schedId) {
    document.getElementById('f-id').value = schedId || '';
    document.getElementById('f-org').value = orgId;
    document.getElementById('f-app').value = appId;
    document.getElementById('f-appname').value = appName;
    document.getElementById('modal-title').textContent = schedId ? 'Modifier le schedule' : 'Ajouter un schedule';

    if (schedId) {
      const s = schedules.find(s => s.id === schedId);
      document.getElementById('f-name').value  = s?.name || '';
      document.getElementById('f-stop').value  = s?.cron_stop || '';
      document.getElementById('f-start').value = s?.cron_start || '';
      document.getElementById('f-tz').value    = s?.timezone || 'Europe/Paris';
      document.getElementById('f-enabled').checked = s?.enabled ?? true;
    } else {
      document.getElementById('sched-form').reset();
      document.getElementById('f-enabled').checked = true;
      document.getElementById('f-tz').value = 'Europe/Paris';
    }
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }
  document.getElementById('overlay').addEventListener('click', e => { if (e.target === document.getElementById('overlay')) closeModal(); });

  document.getElementById('sched-form').addEventListener('submit', async e => {
    e.preventDefault();
    const schedId = document.getElementById('f-id').value;
    const isEdit  = !!schedId;

    const base = {
      timezone: document.getElementById('f-tz').value,
      enabled:  document.getElementById('f-enabled').checked,
    };
    const name  = document.getElementById('f-name').value.trim();
    const stop  = document.getElementById('f-stop').value.trim();
    const start = document.getElementById('f-start').value.trim();
    if (name)  base.name       = name;
    if (stop)  base.cron_stop  = stop;
    if (start) base.cron_start = start;

    if (!isEdit) {
      base.org_id = document.getElementById('f-org').value;
      base.app_id = document.getElementById('f-app').value;
    }

    try {
      if (isEdit) {
        await req('PUT',  '/schedules/' + schedId, base);
      } else {
        await req('POST', '/schedules', base);
      }
      closeModal();
      toast('Schedule enregistré ✓');
      loadOrg(currentOrg.id, currentOrg.name);
    } catch(e) { toast(e.message, true); }
  });

  async function toggleSched(id, enabled) {
    try {
      await req('PUT', '/schedules/' + id, { enabled });
      const s = schedules.find(s => s.id === id);
      if (s) s.enabled = enabled;
      const lbl = document.querySelector(`#sb-${id} .sw-label`);
      if (lbl) lbl.textContent = enabled ? 'Actif' : 'Inactif';
      toast(enabled ? 'Activé' : 'Désactivé');
    } catch(e) { toast(e.message, true); }
  }

  async function trigger(id, action) {
    try {
      await req('POST', '/schedules/' + id + '/trigger/' + action);
      toast(`Action "${action}" déclenchée ✓`);
    } catch(e) { toast(e.message, true); }
  }

  async function delSched(id) {
    if (!confirm('Supprimer ce schedule ?')) return;
    try {
      await req('DELETE', '/schedules/' + id);
      toast('Supprimé');
      loadOrg(currentOrg.id, currentOrg.name);
    } catch(e) { toast(e.message, true); }
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  let toastT;
  function toast(msg, isErr) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = isErr ? 'err' : 'ok';
    clearTimeout(toastT);
    toastT = setTimeout(() => el.className = '', 3000);
  }
</script>
</body>
</html>
