<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CC Scheduler</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #F4F6F9;
      color: #1A2033;
      height: 100vh;
      display: flex;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Sidebar (dark navy) ─────────────────────────────── */
    #sidebar {
      width: 220px; min-width: 220px;
      background: #0B0F1E;
      display: flex; flex-direction: column;
    }

    #sidebar-header {
      padding: 22px 20px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }

    .logo-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
    }

    .brand-name {
      font-size: 14px; font-weight: 700; color: #FFFFFF; letter-spacing: -0.2px;
    }
    .brand-sub {
      font-size: 11px; color: #3D4B6E; margin-top: 2px;
    }

    .org-badge {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 8px; padding: 8px 12px;
    }
    .org-badge-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #CB1C42; flex-shrink: 0;
      box-shadow: 0 0 6px rgba(203,28,66,.5);
    }
    .org-badge-name {
      font-size: 12px; font-weight: 600; color: #C8D0E8;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .sidebar-spacer { flex: 1; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,.06);
    }
    .logout-link {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: #3D4B6E; text-decoration: none;
      transition: color .15s; font-weight: 500;
    }
    .logout-link:hover { color: #CB1C42; }

    /* ── Main (blanc/clair) ──────────────────────────────── */
    #main { flex: 1; overflow-y: auto; background: #F4F6F9; padding: 36px 40px; }

    #main-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px;
    }
    #main-header h2 {
      font-size: 22px; font-weight: 700; color: #0B0F1E; letter-spacing: -0.5px;
    }
    .app-count {
      font-size: 12px; font-weight: 600; color: #64748B;
      background: #FFFFFF; border: 1px solid #E2E8F0;
      padding: 3px 10px; border-radius: 20px;
    }

    /* ── App grid ────────────────────────────────────────── */
    #apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* ── App card ────────────────────────────────────────── */
    .app-card {
      background: #FFFFFF;
      border: 1px solid #E8ECF2;
      border-radius: 14px; padding: 20px;
      transition: border-color .2s, box-shadow .2s;
    }
    .app-card:hover {
      border-color: rgba(203,28,66,.2);
      box-shadow: 0 4px 20px rgba(203,28,66,.07);
    }

    .app-card-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 14px;
    }
    .app-card-title { flex: 1; min-width: 0; }
    .app-card-title h3 {
      font-size: 13px; font-weight: 600; color: #0B0F1E;
      display: flex; align-items: center; gap: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .app-id {
      font-size: 10px; color: #B0BDD0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-top: 4px;
    }

    .dot { width: 7px; height: 7px; min-width: 7px; border-radius: 50%; }
    .dot-on  { background: #CB1C42; box-shadow: 0 0 6px rgba(203,28,66,.45); }
    .dot-off { background: #D0D8E8; }

    /* ── Schedule block ──────────────────────────────────── */
    .sched-block {
      background: #F8FAFC;
      border: 1px solid #EEF1F6;
      border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    }
    .sched-row {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; margin-bottom: 7px;
    }
    .sched-row:last-child { margin-bottom: 0; }
    .sched-label { color: #94A3B8; font-size: 11px; font-weight: 500; min-width: 44px; }

    .cron-tag {
      background: rgba(203,28,66,.07);
      color: #CB1C42;
      padding: 2px 8px; border-radius: 5px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11px; font-weight: 600;
      border: 1px solid rgba(203,28,66,.12);
    }
    .tz-tag { color: #94A3B8; font-size: 11px; }

    /* ── Toggle ──────────────────────────────────────────── */
    .sw { position: relative; display: inline-flex; align-items: center; cursor: pointer; gap: 8px; }
    .sw input { opacity: 0; width: 0; height: 0; position: absolute; }
    .sw-track {
      width: 28px; height: 16px;
      background: #D0D8E8; border-radius: 8px;
      transition: background .2s; position: relative;
    }
    .sw input:checked ~ .sw-track { background: #CB1C42; }
    .sw-thumb {
      position: absolute; top: 2px; left: 2px;
      width: 12px; height: 12px;
      background: white; border-radius: 50%; transition: left .2s;
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }
    .sw input:checked ~ .sw-track .sw-thumb { left: 14px; }
    .sw-label { font-size: 11px; color: #94A3B8; font-weight: 500; }

    /* ── Buttons ─────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 7px; border: none;
      cursor: pointer; font-size: 12px; font-weight: 600;
      font-family: inherit; transition: all .15s; white-space: nowrap;
    }
    .btn-primary { background: #CB1C42; color: #fff; }
    .btn-primary:hover { background: #E01E4A; box-shadow: 0 2px 12px rgba(203,28,66,.35); }
    .btn-green  { background: #F0FDF4; color: #16A34A; border: 1px solid #BBF7D0; }
    .btn-green:hover  { background: #DCFCE7; }
    .btn-red    { background: #FFF5F5; color: #DC2626; border: 1px solid #FECACA; }
    .btn-red:hover    { background: #FEE2E2; }
    .btn-ghost  { background: #FFFFFF; color: #64748B; border: 1px solid #E2E8F0; }
    .btn-ghost:hover  { background: #F8FAFC; color: #334155; border-color: #CBD5E1; }
    .btn-icon   { padding: 5px 9px; }
    .btn-add {
      background: transparent; color: #B0BDD0;
      border: 1px dashed #D8E0EC;
      width: 100%; justify-content: center; padding: 9px; margin-top: 4px;
      border-radius: 8px; font-size: 12px;
    }
    .btn-add:hover {
      background: rgba(203,28,66,.04);
      border-color: rgba(203,28,66,.3);
      color: #CB1C42; border-style: solid;
    }

    /* ── States ──────────────────────────────────────────── */
    .state-center {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: calc(100vh - 140px); text-align: center;
    }
    .state-center p { font-size: 14px; margin-top: 14px; font-weight: 500; color: #94A3B8; }

    .loader-inline {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #E2E8F0; border-top-color: #CB1C42;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Modal ───────────────────────────────────────────── */
    #overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(11,15,30,.55);
      backdrop-filter: blur(4px);
      z-index: 50; align-items: center; justify-content: center;
    }
    #overlay.open { display: flex; }
    #modal {
      background: #FFFFFF;
      border: 1px solid #E2E8F0;
      border-radius: 16px; padding: 28px;
      width: 460px; max-width: 96vw; max-height: 92vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(11,15,30,.15);
    }
    #modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 22px; color: #0B0F1E; }

    .fg { margin-bottom: 14px; }
    .fg label:not(.sw) {
      display: block; font-size: 10px; font-weight: 600;
      color: #94A3B8; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .fg input, .fg select {
      width: 100%; background: #F8FAFC;
      border: 1px solid #E2E8F0;
      color: #0B0F1E; padding: 9px 12px; border-radius: 8px;
      font-size: 13px; font-family: inherit; outline: none;
      transition: border .15s;
    }
    .fg input:focus, .fg select:focus {
      border-color: #CB1C42;
      box-shadow: 0 0 0 3px rgba(203,28,66,.08);
      background: #FFFFFF;
    }
    .fg input:disabled { opacity: 1; cursor: default; background: #F1F5F9; color: #334155; font-weight: 500; }
    .fg-hint { font-size: 10px; color: #B0BDD0; margin-top: 5px; }
    .fg-row { display: flex; gap: 12px; }
    .fg-row .fg { flex: 1; }

    .modal-footer {
      display: flex; justify-content: flex-end; gap: 8px;
      margin-top: 20px; border-top: 1px solid #F1F5F9; padding-top: 18px;
    }

    /* ── Toast ───────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 11px 18px; border-radius: 10px; font-size: 13px; font-weight: 500;
      transform: translateY(80px); transition: transform .3s cubic-bezier(.34,1.56,.64,1);
      z-index: 100; pointer-events: none;
    }
    #toast.ok  { background: #F0FDF4; border: 1px solid #BBF7D0; color: #15803D; transform: translateY(0); }
    #toast.err { background: #FFF5F5; border: 1px solid #FECACA; color: #DC2626; transform: translateY(0); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D0D8E8; border-radius: 2px; }

    select option { background: #FFFFFF; color: #0B0F1E; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div class="logo-row">
      <svg width="30" height="30" viewBox="0 0 100 116" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,2  7,29  33,62  50,38"  fill="#F2926B"/>
        <polygon points="50,2  50,38 93,29"         fill="#E55C3A"/>
        <polygon points="7,29  7,87  33,62"         fill="#CC3A28"/>
        <polygon points="50,38 33,62 67,62"         fill="#C03030"/>
        <polygon points="50,38 67,62 93,29"         fill="#A82020"/>
        <polygon points="93,29 67,62 93,87"         fill="#8C1818"/>
        <polygon points="33,62 7,87  50,86"         fill="#721028"/>
        <polygon points="33,62 50,86 67,62"         fill="#600D20"/>
        <polygon points="67,62 50,86 93,87"         fill="#4E0A1A"/>
        <polygon points="7,87  50,114 50,86"        fill="#5C1024"/>
        <polygon points="50,86 50,114 93,87"        fill="#420B18"/>
      </svg>
      <div>
        <div class="brand-name">CC Scheduler</div>
        <div class="brand-sub">Clever Cloud</div>
      </div>
    </div>
    <div class="org-badge">
      <span class="org-badge-dot"></span>
      <span class="org-badge-name" id="sidebar-org-name">Chargement…</span>
    </div>
  </div>

  <div class="sidebar-spacer"></div>

  <div class="sidebar-footer">
    <a href="/auth/logout" class="logout-link">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"/>
      </svg>
      Déconnexion
    </a>
  </div>
</div>

<div id="main">
  <div id="content">
    <div class="state-center">
      <span class="loader-inline" style="width:24px;height:24px;border-width:3px"></span>
      <p>Chargement…</p>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="overlay">
  <div id="modal">
    <h3 id="modal-title">Nouvelle plage horaire</h3>
    <form id="sched-form" autocomplete="off">
      <input type="hidden" id="f-id">
      <input type="hidden" id="f-org">
      <input type="hidden" id="f-app">
      <div class="fg">
        <label>Application</label>
        <input type="text" id="f-appname" disabled>
      </div>
      <div class="fg">
        <label>Nom <span style="color:#B0BDD0;text-transform:none;letter-spacing:0;font-weight:400">(optionnel)</span></label>
        <input type="text" id="f-name" placeholder="ex: Nuit semaine, Week-end…">
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Heure d'extinction</label>
          <input type="text" id="f-stop" placeholder="0 20 * * 1-5">
        </div>
        <div class="fg">
          <label>Heure de démarrage</label>
          <input type="text" id="f-start" placeholder="0 8 * * 1-5">
        </div>
      </div>
      <div class="fg-row">
        <div class="fg">
          <label>Fuseau horaire</label>
          <select id="f-tz">
            <option value="Europe/Paris">Europe/Paris</option>
            <option value="UTC">UTC</option>
            <option value="Europe/London">Europe/London</option>
            <option value="Europe/Berlin">Europe/Berlin</option>
            <option value="America/New_York">America/New_York</option>
            <option value="America/Chicago">America/Chicago</option>
            <option value="America/Los_Angeles">America/Los_Angeles</option>
            <option value="Asia/Tokyo">Asia/Tokyo</option>
            <option value="Asia/Shanghai">Asia/Shanghai</option>
          </select>
        </div>
        <div class="fg" style="display:flex;align-items:flex-end;padding-bottom:2px">
          <label class="sw" style="cursor:pointer">
            <input type="checkbox" id="f-enabled" checked>
            <span class="sw-track"><span class="sw-thumb"></span></span>
            <span class="sw-label" style="font-size:13px;color:#334155">Actif</span>
          </label>
        </div>
      </div>
      <div class="fg-hint" style="margin-bottom:12px">
        Format cron : <code style="color:#CB1C42;font-family:monospace">minute heure * * jours</code>
        — ex: <code style="color:#CB1C42;font-family:monospace">0 20 * * 1-5</code> = lun–ven à 20h.
        Laisser vide pour ne pas planifier.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">Annuler</button>
        <button type="submit" class="btn btn-primary">Enregistrer</button>
      </div>
    </form>
  </div>
</div>

<div id="toast"></div>

<script>
  let currentOrg = null;
  let schedules = [];

  async function req(method, path, body) {
    const r = await fetch(path, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined
    });
    if (r.status === 401) { window.location.href = '/auth/login'; return; }
    if (!r.ok) { const t = await r.text(); throw new Error(t || r.status); }
    if (r.status === 204) return null;
    return r.json();
  }

  // Chargement automatique au démarrage
  (async () => {
    try {
      const orgs = await req('GET', '/orgs');
      if (!Array.isArray(orgs) || orgs.length === 0) throw new Error('Aucune organisation configurée');
      const org = orgs[0];
      document.getElementById('sidebar-org-name').textContent = org.name;
      await loadOrg(org.id, org.name);
    } catch(e) {
      document.getElementById('sidebar-org-name').textContent = 'Erreur';
      document.getElementById('content').innerHTML =
        `<div class="state-center"><p style="color:#DC2626">${esc(e.message)}</p></div>`;
    }
  })();

  async function loadOrg(orgId, orgName) {
    currentOrg = { id: orgId, name: orgName };

    document.getElementById('content').innerHTML =
      `<div id="main-header"><h2>${esc(orgName)}</h2></div>` +
      `<div style="display:flex;align-items:center;gap:10px;color:#94A3B8;font-size:13px"><span class="loader-inline"></span> Chargement…</div>`;

    try {
      const [apps, scheds] = await Promise.all([
        req('GET', '/orgs/' + orgId + '/apps'),
        req('GET', '/schedules')
      ]);
      schedules = scheds || [];
      renderOrg(orgId, orgName, Array.isArray(apps) ? apps : [], schedules);
    } catch(e) {
      document.getElementById('content').innerHTML =
        `<div id="main-header"><h2>${esc(orgName)}</h2></div>` +
        `<div style="color:#DC2626;font-size:13px">Erreur : ${esc(e.message)}</div>`;
    }
  }

  function renderOrg(orgId, orgName, apps, scheds) {
    const count = apps.length;
    if (count === 0) {
      document.getElementById('content').innerHTML =
        `<div id="main-header"><h2>${esc(orgName)}</h2></div>` +
        `<div style="color:#94A3B8;padding:48px 0;text-align:center;font-size:14px">Aucune application dans cette organisation</div>`;
      return;
    }
    const cards = apps.map(app => buildCard(orgId, app, scheds.filter(s => s.app_id === app.id))).join('');
    document.getElementById('content').innerHTML =
      `<div id="main-header">
        <h2>${esc(orgName)}</h2>
        <span class="app-count">${count} app${count > 1 ? 's' : ''}</span>
      </div>` +
      `<div id="apps-grid">${cards}</div>`;
  }

  function buildCard(orgId, app, appScheds) {
    const name = app.name || app.id;
    const hasScheds = appScheds.length > 0;

    const schedHtml = appScheds.map(s => `
      <div class="sched-block" id="sb-${s.id}">
        ${s.name ? `<div class="sched-row"><span class="sched-label">Nom</span><span style="font-size:12px;color:#334155;font-weight:500">${esc(s.name)}</span></div>` : ''}
        ${s.cron_stop  ? `<div class="sched-row"><span class="sched-label">Extinction</span><span class="cron-tag">${esc(s.cron_stop)}</span></div>`  : ''}
        ${s.cron_start ? `<div class="sched-row"><span class="sched-label">Démarrage</span><span class="cron-tag">${esc(s.cron_start)}</span></div>` : ''}
        <div class="sched-row">
          <span class="sched-label">TZ</span>
          <span class="tz-tag">${esc(s.timezone)}</span>
        </div>
        <div class="sched-row" style="margin-top:10px">
          <label class="sw">
            <input type="checkbox" ${s.enabled ? 'checked' : ''} onchange="toggleSched('${s.id}',this.checked)">
            <span class="sw-track"><span class="sw-thumb"></span></span>
            <span class="sw-label">${s.enabled ? 'Actif' : 'Inactif'}</span>
          </label>
          <div style="display:flex;gap:5px">
            <button class="btn btn-green btn-icon" title="Démarrer maintenant"  onclick="trigger('${s.id}','start')">▶</button>
            <button class="btn btn-red   btn-icon" title="Éteindre maintenant"  onclick="trigger('${s.id}','stop')">■</button>
            <button class="btn btn-ghost btn-icon" title="Modifier"             onclick="openModal('${orgId}','${app.id}','${esc(name)}','${s.id}')">✎</button>
            <button class="btn btn-red   btn-icon" title="Supprimer"            onclick="delSched('${s.id}')">✕</button>
          </div>
        </div>
      </div>
    `).join('');

    return `
      <div class="app-card" id="card-${app.id}">
        <div class="app-card-header">
          <div class="app-card-title">
            <h3><span class="dot ${hasScheds ? 'dot-on' : 'dot-off'}"></span>${esc(name)}</h3>
            <div class="app-id">${app.id}</div>
          </div>
        </div>
        ${schedHtml}
        <button class="btn btn-add" onclick="openModal('${orgId}','${app.id}','${esc(name)}',null)">
          + Ajouter une plage horaire
        </button>
      </div>
    `;
  }

  function openModal(orgId, appId, appName, schedId) {
    document.getElementById('f-id').value      = schedId || '';
    document.getElementById('f-org').value     = orgId;
    document.getElementById('f-app').value     = appId;
    document.getElementById('f-appname').value = appName;
    document.getElementById('modal-title').textContent = schedId ? 'Modifier la plage horaire' : 'Nouvelle plage horaire';

    if (schedId) {
      const s = schedules.find(s => s.id === schedId);
      document.getElementById('f-name').value      = s?.name || '';
      document.getElementById('f-stop').value      = s?.cron_stop || '';
      document.getElementById('f-start').value     = s?.cron_start || '';
      document.getElementById('f-tz').value        = s?.timezone || 'Europe/Paris';
      document.getElementById('f-enabled').checked = s?.enabled ?? true;
    } else {
      document.getElementById('sched-form').reset();
      document.getElementById('f-enabled').checked = true;
      document.getElementById('f-tz').value = 'Europe/Paris';
    }
    document.getElementById('overlay').classList.add('open');
  }

  function closeModal() { document.getElementById('overlay').classList.remove('open'); }
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeModal();
  });

  document.getElementById('sched-form').addEventListener('submit', async e => {
    e.preventDefault();
    const schedId = document.getElementById('f-id').value;
    const isEdit  = !!schedId;

    const base = {
      timezone: document.getElementById('f-tz').value,
      enabled:  document.getElementById('f-enabled').checked,
    };
    const name  = document.getElementById('f-name').value.trim();
    const stop  = document.getElementById('f-stop').value.trim();
    const start = document.getElementById('f-start').value.trim();
    if (name)  base.name       = name;
    if (stop)  base.cron_stop  = stop;
    if (start) base.cron_start = start;

    if (!isEdit) {
      base.org_id = document.getElementById('f-org').value;
      base.app_id = document.getElementById('f-app').value;
    }

    try {
      if (isEdit) { await req('PUT',  '/schedules/' + schedId, base); }
      else        { await req('POST', '/schedules', base); }
      closeModal();
      toast('Plage horaire enregistrée ✓');
      loadOrg(currentOrg.id, currentOrg.name);
    } catch(e) { toast(e.message, true); }
  });

  async function toggleSched(id, enabled) {
    try {
      await req('PUT', '/schedules/' + id, { enabled });
      const s = schedules.find(s => s.id === id);
      if (s) s.enabled = enabled;
      const lbl = document.querySelector(`#sb-${id} .sw-label`);
      if (lbl) lbl.textContent = enabled ? 'Actif' : 'Inactif';
      toast(enabled ? 'Activé' : 'Désactivé');
    } catch(e) { toast(e.message, true); }
  }

  async function trigger(id, action) {
    try {
      await req('POST', '/schedules/' + id + '/trigger/' + action);
      toast(`Action "${action}" déclenchée ✓`);
    } catch(e) { toast(e.message, true); }
  }

  async function delSched(id) {
    if (!confirm('Supprimer cette plage horaire ?')) return;
    try {
      await req('DELETE', '/schedules/' + id);
      toast('Plage horaire supprimée');
      loadOrg(currentOrg.id, currentOrg.name);
    } catch(e) { toast(e.message, true); }
  }

  function esc(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  let toastT;
  function toast(msg, isErr) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = isErr ? 'err' : 'ok';
    clearTimeout(toastT);
    toastT = setTimeout(() => el.className = '', 3200);
  }
</script>
</body>
</html>
